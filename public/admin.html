<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin · Carb Quiz Results</title>
  <style>
    :root { --bg: #0f172a; --card: #1e293b; --text: #e2e8f0; --muted: #94a3b8; --accent: #38bdf8; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 1.5rem; }
    .wrap { max-width: 1100px; margin: 0 auto; }
    h1 { font-size: 1.3rem; margin-bottom: 1rem; }
    .card { background: var(--card); border-radius: 10px; padding: 1rem; margin-bottom: 1rem; }
    input, button {
      padding: 0.65rem 0.9rem; border-radius: 8px; border: none; font-size: 0.95rem;
    }
    input { background: #334155; color: var(--text); width: 220px; margin-right: 0.5rem; }
    button { background: var(--accent); color: #0f172a; font-weight: 600; cursor: pointer; }
    .stats { display: flex; gap: 1rem; flex-wrap: wrap; margin: 1rem 0; }
    .stat { background: #334155; padding: 0.75rem 1rem; border-radius: 8px; min-width: 140px; }
    .stat b { display: block; font-size: 1.4rem; }
    .stat span { color: var(--muted); font-size: 0.8rem; }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th, td { padding: 0.55rem 0.4rem; border-bottom: 1px solid #334155; text-align: left; vertical-align: top; }
    th { color: var(--muted); font-weight: 600; }
    .err { color: #f87171; margin-top: 0.5rem; }
    .answers { font-size: 0.75rem; color: var(--muted); max-width: 320px; }
    .ok { color: #4ade80; }
    .bad { color: #f87171; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>ผลคะแนน · คาร์โบไฮเดรต Quiz</h1>
    <div class="card">
      <input type="password" id="pw" placeholder="รหัสครู (ADMIN_PASSWORD)">
      <button id="load-btn">โหลดผล</button>
      <button id="export-btn" style="background:#4ade80;margin-left:0.5rem">Export CSV</button>
      <p class="err" id="err"></p>
    </div>
    <div class="card" id="summary-card" style="display:none">
      <div class="stats">
        <div class="stat"><b id="s-total">0</b><span>จำนวนครั้ง</span></div>
        <div class="stat"><b id="s-avg">0</b><span>คะแนนเฉลี่ย</span></div>
        <div class="stat"><b id="s-pct">0%</b><span>% เฉลี่ย</span></div>
      </div>
      <div style="overflow-x:auto">
        <table>
          <thead>
            <tr>
              <th>เวลา</th>
              <th>ชื่อ</th>
              <th>คะแนน</th>
              <th>ถูก</th>
              <th>รายละเอียดแต่ละข้อ</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </div>
  </div>
  <script>
    let lastData = [];

    function fmtAnswers(answers) {
      if (!Array.isArray(answers)) return "";
      return answers.map(a => {
        const mark = a.is_correct ? "✓" : "✗";
        const cls = a.is_correct ? "ok" : "bad";
        return `<span class="${cls}">ข้อ${a.question} ${mark}</span>`;
      }).join(" · ");
    }

    async function load() {
      const pw = document.getElementById("pw").value;
      const err = document.getElementById("err");
      err.textContent = "";
      try {
        const res = await fetch("/api/results", {
          headers: { "x-admin-password": pw },
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "โหลดไม่สำเร็จ");

        lastData = data.attempts || [];
        document.getElementById("summary-card").style.display = "block";
        document.getElementById("s-total").textContent = data.summary.total_attempts;
        document.getElementById("s-avg").textContent = data.summary.avg_score;
        document.getElementById("s-pct").textContent = data.summary.avg_pct + "%";

        const tbody = document.getElementById("rows");
        tbody.innerHTML = lastData.map(r => {
          const pct = Math.round((r.score / r.max_score) * 100);
          const when = new Date(r.created_at).toLocaleString("th-TH");
          return `<tr>
            <td>${when}</td>
            <td>${r.student_name}</td>
            <td>${r.score}/${r.max_score} (${pct}%)</td>
            <td>${r.correct_count}/${r.total_questions}</td>
            <td class="answers">${fmtAnswers(r.answers)}</td>
          </tr>`;
        }).join("");
      } catch (e) {
        err.textContent = e.message;
      }
    }

    function exportCsv() {
      if (!lastData.length) return alert("โหลดข้อมูลก่อน");
      const header = ["created_at","student_name","score","max_score","correct_count","total_questions","q1","q2","q3","q4","q5"];
      const lines = [header.join(",")];
      lastData.forEach(r => {
        const qs = (r.answers || []).reduce((m, a) => { m[a.question] = a.is_correct ? 1 : 0; return m; }, {});
        lines.push([
          r.created_at,
          `"${String(r.student_name).replace(/"/g, '""')}"`,
          r.score, r.max_score, r.correct_count, r.total_questions,
          qs[1] ?? "", qs[2] ?? "", qs[3] ?? "", qs[4] ?? "", qs[5] ?? "",
        ].join(","));
      });
      const blob = new Blob(["\uFEFF" + lines.join("\n")], { type: "text/csv;charset=utf-8" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "carb-quiz-results.csv";
      a.click();
    }

    document.getElementById("load-btn").onclick = load;
    document.getElementById("export-btn").onclick = exportCsv;
    document.getElementById("pw").addEventListener("keydown", e => {
      if (e.key === "Enter") load();
    });
  </script>
</body>
</html>
