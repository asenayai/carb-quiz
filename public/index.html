<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz · คาร์โบไฮเดรต · AP Review</title>
  <style>
    :root {
      --bg: #1a1a2e;
      --card: #16213e;
      --accent: #e94560;
      --green: #0f9b58;
      --red: #d32f2f;
      --text: #eee;
      --muted: #aaa;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 1.5rem;
    }
    .container { max-width: 720px; margin: 0 auto; }
    .container.wide { max-width: 900px; }
    h1 { font-size: 1.4rem; margin-bottom: 0.25rem; }
    .subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.5rem; }
    .screen { display: none; }
    .screen.active { display: block; }
    .card {
      background: var(--card);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1rem;
    }
    .progress {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      font-size: 0.85rem;
      color: var(--muted);
    }
    .timer { font-size: 1.5rem; font-weight: 700; color: var(--accent); }
    .timer.urgent { color: var(--red); animation: pulse 0.5s infinite; }
    @keyframes pulse { 50% { opacity: 0.6; } }
    .question { font-size: 1.15rem; line-height: 1.5; margin-bottom: 1rem; }
    .q-image-wrap {
      margin-bottom: 1.25rem;
      border-radius: 10px;
      overflow: hidden;
      background: #fff;
      cursor: zoom-in;
    }
    .q-image { display: block; width: 100%; max-height: 320px; object-fit: contain; }
    .q-image-wrap.zoomed {
      position: fixed; inset: 0; z-index: 100; margin: 0; border-radius: 0;
      background: rgba(0,0,0,0.92); display: flex; align-items: center;
      justify-content: center; cursor: zoom-out; padding: 1rem;
    }
    .q-image-wrap.zoomed .q-image { max-height: 90vh; max-width: 95vw; }
    .choices { display: grid; gap: 0.75rem; }
    .choice {
      background: #0f3460; border: 2px solid transparent; border-radius: 10px;
      padding: 1rem 1.25rem; cursor: pointer; font-size: 1rem; text-align: left;
      color: var(--text); transition: transform 0.1s, border-color 0.15s;
    }
    .choice:hover:not(:disabled) { transform: scale(1.02); border-color: #3a7bd5; }
    .choice:disabled { cursor: default; opacity: 0.85; }
    .choice.correct { background: #1b5e20; border-color: var(--green); }
    .choice.wrong { background: #5c1a1a; border-color: var(--red); }
    .choice.reveal { background: #1b5e20; border-color: var(--green); }
    .btn {
      background: var(--accent); color: white; border: none; border-radius: 10px;
      padding: 0.9rem 2rem; font-size: 1rem; cursor: pointer; font-weight: 600;
    }
    .btn:hover { filter: brightness(1.1); }
    .btn:disabled { opacity: 0.5; cursor: default; }
    .explanation {
      margin-top: 1rem; padding: 1rem; background: #0d1b2a; border-radius: 8px;
      font-size: 0.9rem; line-height: 1.5; color: #ccc; display: none;
    }
    .explanation.show { display: block; }
    .score-big { font-size: 3rem; font-weight: 700; color: var(--accent); text-align: center; }
    .score-label { text-align: center; color: var(--muted); margin: 0.5rem 0 1.5rem; }
    .status { text-align: center; font-size: 0.85rem; color: var(--muted); margin-top: 0.5rem; }
    input[type="text"] {
      width: 100%; padding: 0.9rem; font-size: 1rem; border: none; border-radius: 8px;
      margin-bottom: 1rem; background: #0f3460; color: var(--text);
    }
    .leaderboard { list-style: none; }
    .leaderboard li {
      display: flex; justify-content: space-between; padding: 0.6rem 0;
      border-bottom: 1px solid #333; gap: 0.5rem;
    }
    .leaderboard li:first-child { font-weight: 700; color: gold; }
    .leaderboard .meta { font-size: 0.75rem; color: var(--muted); }
    .shape { display: inline-block; width: 14px; height: 14px; margin-right: 8px; vertical-align: middle; }
    .shape.triangle { border-left: 7px solid transparent; border-right: 7px solid transparent; border-bottom: 14px solid #e21b3c; }
    .shape.diamond { width: 12px; height: 12px; background: #1368ce; transform: rotate(45deg); margin-right: 10px; }
    .shape.circle { border-radius: 50%; background: #d89e00; }
    .shape.square { background: #26890c; }
  </style>
</head>
<body>
  <div class="container wide">
    <div id="start-screen" class="screen active">
      <h1>คาร์โบไฮเดรต · AP Review</h1>
      <p class="subtitle">5 ข้อ · glycosidic linkage · hydrolysis</p>
      <div class="card">
        <label for="player-name">ชื่อ–นามสกุล (หรือรหัสนักเรียน)</label>
        <input type="text" id="player-name" placeholder="เช่น สมชาย ใจดี หรือ M40123" maxlength="40">
        <button class="btn" id="start-btn" style="width:100%">เริ่ม Quiz</button>
      </div>
    </div>

    <div id="quiz-screen" class="screen">
      <div class="progress">
        <span id="q-num">ข้อ 1/5</span>
        <span class="timer" id="timer">30</span>
        <span id="score-display">คะแนน: 0</span>
      </div>
      <div class="card">
        <p class="question" id="question-text"></p>
        <div id="q-image-container"></div>
        <div class="choices" id="choices"></div>
        <div class="explanation" id="explanation"></div>
        <button class="btn" id="next-btn" style="width:100%;margin-top:1rem;display:none">ข้อถัดไป →</button>
      </div>
    </div>

    <div id="end-screen" class="screen">
      <div class="card" style="text-align:center">
        <p class="score-label">คะแนนของคุณ</p>
        <p class="score-big" id="final-score">0</p>
        <p class="score-label" id="final-pct"></p>
        <p class="status" id="submit-status"></p>
        <button class="btn" id="retry-btn">เล่นอีกครั้ง</button>
      </div>
      <div class="card">
        <h2 style="font-size:1rem;margin-bottom:0.75rem">อันดับล่าสุด (ทั้งห้อง)</h2>
        <ul class="leaderboard" id="leaderboard"></ul>
      </div>
    </div>
  </div>

  <script>
    const QUESTIONS = [
      {
        q: "เมื่อ monosaccharide สองโมเลกุลรวมกันเป็น disaccharide เกิดพันธะประเภทใด และมีกระบวนการอะไรเกิดขึ้น?",
        choices: [
          "glycosidic linkage โดยปล่อยโมเลกุลน้ำ 1 โมเลกุล",
          "hydrogen bond โดยดูดซับโมเลกุลน้ำ 1 โมเลกุล",
          "ionic bond โดยแลกอิเล็กตรอนระหว่าง –OH กับ H",
          "phosphodiester bond โดยใช้ ATP"
        ],
        correct: 0, time: 25, img: "/images/q1.png",
        explain: "dehydration synthesis → สร้าง glycosidic linkage + ปล่อย H₂O"
      },
      {
        q: "starch กับ cellulose ต่างกันอย่างไร ทั้งที่ประกอบด้วย glucose เป็น monomer เหมือนกัน?",
        choices: [
          "starch เป็น protein ส่วน cellulose เป็น lipid",
          "starch มี α-1,4 linkage (และ α-1,6 ที่แขนง) ส่วน cellulose มี β-1,4",
          "starch มี β-1,4 linkage ส่วน cellulose มี α-1,4",
          "starch พบในพืช ส่วน cellulose พบในสัตว์"
        ],
        correct: 1, time: 30, img: "/images/q2.png",
        explain: "monomer เดียวกัน แต่ glycosidic linkage ต่างกัน"
      },
      {
        q: "Amylopectin ในพืช กับ Glycogen ในสัตว์ มีลักษณะโครงสร้างร่วมกันข้อใดที่สอดคล้องกับหน้าที่ energy storage?",
        choices: [
          "เป็นโซ่ตรงยาวทั้งหมด (เฉพาะ α-1,4) ไม่มีแขนง",
          "ประกอบด้วย amino acid ไม่ใช่ sugar",
          "มี β-1,4 linkages ทำให้แข็งและย่อยยาก",
          "มี branching (α-1,6) ทำให้เก็บ glucose ได้มากและแตกออกเร็วเมื่อต้องการ"
        ],
        correct: 3, time: 30, img: "/images/q3.png",
        explain: "amylopectin/glycogen = branched (α-1,6)"
      },
      {
        q: "Disaccharide ต่อไปนี้ ข้อใดมี glycosidic linkage ผิด?",
        choices: [
          "maltose → α-1,4",
          "sucrose → α-1,2",
          "lactose → β-1,4",
          "sucrose → α-1,4"
        ],
        correct: 3, time: 30, img: "/images/q4.png",
        explain: "sucrose ถูกต้องคือ α-1,2"
      },
      {
        q: "เมื่อเอนไซม์ย่อย starch ในลำไส้เล็ก กระบวนการที่เกิดขึ้นคืออะไร?",
        choices: [
          "hydrolysis — ใช้ H₂O ตัด glycosidic linkage ได้ glucose",
          "dehydration synthesis — ปล่อย H₂O สร้าง glycosidic linkage ได้ glucose",
          "hydrolysis — ปล่อย H₂O สร้าง hydrogen bond ได้ glucose",
          "dehydration synthesis — ใช้ H₂O ตัด phosphodiester bond ได้ glucose"
        ],
        correct: 0, time: 30, img: "/images/q5.png",
        explain: "hydrolysis = polymer → monomer"
      }
    ];

    const SHAPES = ["triangle", "diamond", "circle", "square"];
    const MAX_SCORE = QUESTIONS.reduce((s, q) => s + 1000, 0);

    let current = 0, score = 0, correctCount = 0;
    let timerId = null, timeLeft = 0, answered = false;
    let playerName = "", answerLog = [];

    const $ = id => document.getElementById(id);
    const show = id => {
      document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
      $(id).classList.add("active");
    };

    function calcPoints(time, maxTime) {
      return Math.max(100, Math.round(1000 * (time / maxTime)));
    }

    function startTimer(max) {
      timeLeft = max;
      $("timer").textContent = timeLeft;
      $("timer").classList.remove("urgent");
      clearInterval(timerId);
      timerId = setInterval(() => {
        timeLeft--;
        $("timer").textContent = timeLeft;
        if (timeLeft <= 5) $("timer").classList.add("urgent");
        if (timeLeft <= 0) { clearInterval(timerId); if (!answered) revealAnswer(null); }
      }, 1000);
    }

    function renderImage(q) {
      const container = $("q-image-container");
      container.innerHTML = "";
      if (!q.img) return;
      const wrap = document.createElement("div");
      wrap.className = "q-image-wrap";
      const img = document.createElement("img");
      img.className = "q-image";
      img.src = q.img;
      img.alt = q.q.slice(0, 60);
      wrap.appendChild(img);
      wrap.onclick = () => {
        wrap.classList.toggle("zoomed");
        document.body.style.overflow = wrap.classList.contains("zoomed") ? "hidden" : "";
      };
      container.appendChild(wrap);
    }

    function renderQuestion() {
      const q = QUESTIONS[current];
      answered = false;
      $("q-num").textContent = `ข้อ ${current + 1}/${QUESTIONS.length}`;
      $("question-text").textContent = q.q;
      renderImage(q);
      $("explanation").classList.remove("show");
      $("next-btn").style.display = "none";
      const box = $("choices");
      box.innerHTML = "";
      q.choices.forEach((c, i) => {
        const btn = document.createElement("button");
        btn.className = "choice";
        btn.innerHTML = `<span class="shape ${SHAPES[i]}"></span>${c}`;
        btn.onclick = () => pick(i);
        box.appendChild(btn);
      });
      startTimer(q.time);
    }

    function revealAnswer(picked) {
      answered = true;
      clearInterval(timerId);
      const q = QUESTIONS[current];
      const isCorrect = picked === q.correct;
      const points = isCorrect ? calcPoints(timeLeft, q.time) : 0;

      answerLog.push({
        question: current + 1,
        picked,
        correct: q.correct,
        is_correct: isCorrect,
        points,
        time_left: timeLeft,
        choice_text: picked !== null ? q.choices[picked] : null,
      });

      const btns = $("choices").querySelectorAll(".choice");
      btns.forEach((b, i) => {
        b.disabled = true;
        if (i === q.correct) b.classList.add(picked === null ? "reveal" : "correct");
        else if (i === picked) b.classList.add("wrong");
      });

      if (isCorrect) {
        score += points;
        correctCount++;
        $("score-display").textContent = `คะแนน: ${score}`;
      }

      $("explanation").textContent = "💡 " + q.explain;
      $("explanation").classList.add("show");
      $("next-btn").style.display = "block";
      $("next-btn").textContent = current < QUESTIONS.length - 1 ? "ข้อถัดไป →" : "ดูผลคะแนน";
    }

    function pick(i) { if (!answered) revealAnswer(i); }

    async function submitScore() {
      $("submit-status").textContent = "กำลังบันทึกคะแนน...";
      try {
        const res = await fetch("/api/submit", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            student_name: playerName,
            score,
            max_score: MAX_SCORE,
            correct_count: correctCount,
            total_questions: QUESTIONS.length,
            answers: answerLog,
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "บันทึกไม่สำเร็จ");
        $("submit-status").textContent = "✓ บันทึกคะแนนแล้ว";
      } catch (err) {
        $("submit-status").textContent = "⚠ บันทึกไม่สำเร็จ: " + err.message;
      }
    }

    async function loadLeaderboard() {
      const lb = $("leaderboard");
      lb.innerHTML = "<li>กำลังโหลด...</li>";
      try {
        const res = await fetch("/api/leaderboard?limit=15");
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        const rows = data.leaderboard || [];
        lb.innerHTML = rows.length
          ? rows.map((s, i) => {
              const pct = Math.round((s.score / s.max_score) * 100);
              const when = new Date(s.created_at).toLocaleString("th-TH");
              return `<li>
                <span>${i + 1}. ${s.student_name}<br><span class="meta">${s.correct_count}/${s.total_questions} ข้อ · ${when}</span></span>
                <span>${s.score} (${pct}%)</span>
              </li>`;
            }).join("")
          : "<li>ยังไม่มีข้อมูล</li>";
      } catch {
        lb.innerHTML = "<li>โหลดอันดับไม่สำเร็จ</li>";
      }
    }

    async function endQuiz() {
      show("end-screen");
      $("final-score").textContent = score;
      $("final-pct").textContent = `${Math.round(score / MAX_SCORE * 100)}% · ${score} / ${MAX_SCORE} · ถูก ${correctCount}/${QUESTIONS.length} ข้อ`;
      await submitScore();
      await loadLeaderboard();
    }

    $("start-btn").onclick = () => {
      playerName = $("player-name").value.trim();
      if (!playerName) {
        alert("กรุณากรอกชื่อหรือรหัสนักเรียน");
        return;
      }
      current = 0; score = 0; correctCount = 0; answerLog = [];
      $("score-display").textContent = "คะแนน: 0";
      show("quiz-screen");
      renderQuestion();
    };

    $("next-btn").onclick = () => {
      current++;
      if (current < QUESTIONS.length) renderQuestion();
      else endQuiz();
    };

    $("retry-btn").onclick = () => show("start-screen");

    $("player-name").addEventListener("keydown", e => {
      if (e.key === "Enter") $("start-btn").click();
    });
  </script>
</body>
</html>
